# XDG-relocated paths for tools invoked outside an interactive fish shell.

GNUPGHOME=${XDG_CONFIG_HOME}/gnupg
GRADLE_USER_HOME=${XDG_DATA_HOME}/gradle
GTK2_RC_FILES=${XDG_CONFIG_HOME}/gtk-2.0/gtkrc
DOCKER_CONFIG=${XDG_CONFIG_HOME}/docker
WGETRC=${XDG_CONFIG_HOME}/wget/wgetrc
WINEDLLOVERRIDES=winemenubuilder.exe=d
IPYTHONDIR=${XDG_CONFIG_HOME}/jupyter
JUPYTER_CONFIG_DIR=${XDG_CONFIG_HOME}/jupyter
POETRY_HOME=${XDG_DATA_HOME}/poetry
GOPATH=${XDG_DATA_HOME}/go
GOMODCACHE=${XDG_CACHE_HOME}/go/mod
RUSTUP_HOME=${XDG_DATA_HOME}/rustup
CARGO_HOME=${XDG_DATA_HOME}/cargo
NPM_PACKAGES=${XDG_DATA_HOME}/npm
NPM_CONFIG_USERCONFIG=${XDG_CONFIG_HOME}/npm/npmrc
PSQLRC=${XDG_CONFIG_HOME}/pg/psqlrc
PGSERVICEFILE=${XDG_CONFIG_HOME}/pg/pg_service.conf
PGPASSFILE=${XDG_CONFIG_HOME}/pg/pgpass
INPUTRC=${XDG_CONFIG_HOME}/readline/inputrc
PARALLEL_HOME=${XDG_CONFIG_HOME}/parallel
FFMPEG_DATADIR=${XDG_CONFIG_HOME}/ffmpeg
RUFF_CACHE_DIR=${XDG_CACHE_HOME}/ruff
PYTHON_EGG_CACHE=${XDG_CACHE_HOME}/python-eggs
UV_NO_MODIFY_PATH=1

# ~/.local/bin first so user-installed binaries win.
PATH=${HOME}/.local/bin:${XDG_DATA_HOME}/cargo/bin:${XDG_DATA_HOME}/go/bin:${XDG_DATA_HOME}/npm/bin:${XDG_DATA_HOME}/poetry/bin:${XDG_CONFIG_HOME}/composer/vendor/bin:${XDG_DATA_HOME}/JetBrains/scripts:${PATH}
